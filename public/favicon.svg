<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Background -->
  <rect width="32" height="32" rx="7" fill="#1a1612"/>
  <!-- Cassette body -->
  <rect x="2.5" y="8" width="27" height="18" rx="3.5" fill="#221e19"/>
  <rect x="3.5" y="9" width="25" height="16" rx="2.5" fill="#2e2820"/>
  <!-- Center label -->
  <rect x="13" y="9.5" width="6" height="5.5" rx="1.5" fill="#c8a87a" opacity="0.25"/>
  <rect x="14.5" y="11" width="3" height="0.8" rx="0.4" fill="#c8a87a" opacity="0.7"/>
  <rect x="14.5" y="12.5" width="3" height="0.8" rx="0.4" fill="#c8a87a" opacity="0.45"/>
  <!-- Left reel -->
  <circle cx="10" cy="16" r="5" fill="#1a1612"/>
  <circle cx="10" cy="16" r="3.5" fill="#3a3028"/>
  <line x1="10" y1="12.5" x2="10" y2="16" stroke="#c8a87a" stroke-width="0.9" stroke-linecap="round"/>
  <line x1="13" y1="17.8" x2="10" y2="16" stroke="#c8a87a" stroke-width="0.9" stroke-linecap="round"/>
  <line x1="7" y1="17.8" x2="10" y2="16" stroke="#c8a87a" stroke-width="0.9" stroke-linecap="round"/>
  <circle cx="10" cy="16" r="1.4" fill="#e0c090"/>
  <!-- Right reel -->
  <circle cx="22" cy="16" r="5" fill="#1a1612"/>
  <circle cx="22" cy="16" r="3.5" fill="#3a3028"/>
  <line x1="22" y1="12.5" x2="22" y2="16" stroke="#c8a87a" stroke-width="0.9" stroke-linecap="round"/>
  <line x1="25" y1="17.8" x2="22" y2="16" stroke="#c8a87a" stroke-width="0.9" stroke-linecap="round"/>
  <line x1="19" y1="17.8" x2="22" y2="16" stroke="#c8a87a" stroke-width="0.9" stroke-linecap="round"/>
  <circle cx="22" cy="16" r="1.4" fill="#e0c090"/>
  <!-- Tape window cutout -->
  <rect x="13" y="20" width="6" height="5" fill="#1a1612"/>
  <path d="M10 22 Q10 24 13 24 L19 24 Q22 24 22 22" stroke="#c8a87a" stroke-width="0.8" fill="none" opacity="0.6"/>
</svg>
